openapi: 3.0.3
info:
  title: VOXTREE Project Management API
  description: |
    A comprehensive project management system API with features for:
    - User authentication and authorization
    - Project and task management
    - Time tracking and billing
    - Invoice generation and payment processing
    - Real-time notifications
  version: 1.0.0
  contact:
    name: VOXINNOV PVT LTD
    email: contact@voxinnov.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3001/api
    description: Development server
  - url: https://api.voxtree.com/api
    description: Production server

security:
  - bearerAuth: []

paths:
  # Authentication endpoints
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and return access/refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@example.com
                password:
                  type: string
                  format: password
                  example: Admin@123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      refreshToken:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Get new access token using refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Invalidate refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # User endpoints
  /users/me:
    get:
      tags:
        - Users
      summary: Get current user
      description: Get information about the currently authenticated user
      responses:
        '200':
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Project endpoints
  /projects:
    get:
      tags:
        - Projects
      summary: Get all projects
      description: Retrieve list of projects with pagination
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Projects
      summary: Create new project
      description: Create a new project (requires Founder or ProjectManager role)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Project'
                  message:
                    type: string
                    example: "Project created successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /projects/{id}:
    get:
      tags:
        - Projects
      summary: Get project by ID
      description: Retrieve a specific project by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags:
        - Projects
      summary: Update project
      description: Update an existing project
      parameters:
        - name: id
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Project'
                  message:
                    type: string
                    example: "Project updated successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Projects
      summary: Delete project
      description: Delete a project (requires Founder role)
      parameters:
        - name: id
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Project deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Task endpoints
  /tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks
      description: Retrieve list of tasks with pagination and filtering
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 10
        - name: projectId
          in: query
          description: Filter by project ID
          schema:
            type: integer
        - name: status
          in: query
          description: Filter by task status
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
      responses:
        '200':
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Tasks
      summary: Create new task
      description: Create a new task in a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Task'
                  message:
                    type: string
                    example: "Task created successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tasks/{id}:
    get:
      tags:
        - Tasks
      summary: Get task by ID
      description: Retrieve a specific task by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Task retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags:
        - Tasks
      summary: Update task
      description: Update an existing task
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Task'
                  message:
                    type: string
                    example: "Task updated successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Tasks
      summary: Delete task
      description: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Task deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{id}/assign:
    post:
      tags:
        - Tasks
      summary: Assign task to users
      description: Assign a task to one or more users
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userIds
              properties:
                userIds:
                  type: array
                  items:
                    type: integer
                  example: [1, 2, 3]
      responses:
        '200':
          description: Task assigned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Task'
                  message:
                    type: string
                    example: "Task assigned successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{id}/comments:
    post:
      tags:
        - Tasks
      summary: Add comment to task
      description: Add a comment to a task
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  example: "This is a comment on the task"
      responses:
        '201':
          description: Comment added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Comment'
                  message:
                    type: string
                    example: "Comment added successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # Time Entry endpoints
  /time-entries/start:
    post:
      tags:
        - Time Tracking
      summary: Start time tracking
      description: Start tracking time for a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - taskId
              properties:
                taskId:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Time tracking started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/TimeEntry'
                  message:
                    type: string
                    example: "Time tracking started"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /time-entries/stop:
    post:
      tags:
        - Time Tracking
      summary: Stop time tracking
      description: Stop tracking time for a running entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entryId
              properties:
                entryId:
                  type: integer
                  example: 1
      responses:
        '200':
          description: Time tracking stopped successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/TimeEntry'
                  message:
                    type: string
                    example: "Time tracking stopped"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /time-entries:
    post:
      tags:
        - Time Tracking
      summary: Create manual time entry
      description: Create a manual time entry for a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimeEntryRequest'
      responses:
        '201':
          description: Time entry created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/TimeEntry'
                  message:
                    type: string
                    example: "Time entry created successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}/time-entries:
    get:
      tags:
        - Time Tracking
      summary: Get user time entries
      description: Retrieve time entries for a specific user with optional filtering
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1
        - name: projectId
          in: query
          description: Filter by project ID
          schema:
            type: integer
        - name: from
          in: query
          description: Start date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End date (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Time entries retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /projects/{id}/timesheet:
    get:
      tags:
        - Time Tracking
      summary: Get project timesheet
      description: Get aggregated timesheet data for a project
      parameters:
        - name: id
          in: path
          required: true
          description: Project ID
          schema:
            type: integer
            example: 1
        - name: from
          in: query
          description: Start date (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End date (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Timesheet data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimesheetEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Invoice endpoints
  /invoices:
    post:
      tags:
        - Invoicing
      summary: Create invoice
      description: Create a new invoice from timesheet data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Invoice created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Invoice'
                  message:
                    type: string
                    example: "Invoice created successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /invoices/{id}:
    get:
      tags:
        - Invoicing
      summary: Get invoice by ID
      description: Retrieve a specific invoice by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Invoice ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Invoice retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /invoices/{id}/send:
    post:
      tags:
        - Invoicing
      summary: Send invoice
      description: Send invoice via email to client
      parameters:
        - name: id
          in: path
          required: true
          description: Invoice ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: client@example.com
                message:
                  type: string
                  example: "Please find attached invoice for your review."
      responses:
        '200':
          description: Invoice sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      emailContent:
                        type: object
                      sentAt:
                        type: string
                        format: date-time
                  message:
                    type: string
                    example: "Invoice sent successfully (email job logged)"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /invoices/{id}/pay:
    post:
      tags:
        - Invoicing
      summary: Record payment
      description: Record a payment for an invoice
      parameters:
        - name: id
          in: path
          required: true
          description: Invoice ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentRequest'
      responses:
        '201':
          description: Payment recorded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      payment:
                        $ref: '#/components/schemas/Payment'
                      invoice:
                        type: object
                        properties:
                          id:
                            type: integer
                          status:
                            type: string
                          totalPaid:
                            type: number
                          balance:
                            type: number
                  message:
                    type: string
                    example: "Payment recorded successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /invoices/{id}/pdf:
    get:
      tags:
        - Invoicing
      summary: Generate invoice PDF
      description: Generate HTML template for invoice PDF
      parameters:
        - name: id
          in: path
          required: true
          description: Invoice ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Invoice PDF generated successfully
          content:
            text/html:
              schema:
                type: string
                example: "<!DOCTYPE html><html>...</html>"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Notification endpoints
  /notifications:
    get:
      tags:
        - Notifications
      summary: Get user notifications
      description: Retrieve notifications for the current user
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 20
        - name: unreadOnly
          in: query
          description: Filter unread notifications only
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      notifications:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
                      unreadCount:
                        type: integer
                        example: 5
                  message:
                    type: string
                    example: "Notifications retrieved successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/mark-read:
    post:
      tags:
        - Notifications
      summary: Mark notifications as read
      description: Mark specific notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - notificationIds
              properties:
                notificationIds:
                  type: array
                  items:
                    type: integer
                  example: [1, 2, 3]
      responses:
        '200':
          description: Notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      updatedCount:
                        type: integer
                        example: 3
                  message:
                    type: string
                    example: "Notifications marked as read"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/mark-all-read:
    post:
      tags:
        - Notifications
      summary: Mark all notifications as read
      description: Mark all notifications for the current user as read
      responses:
        '200':
          description: All notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      updatedCount:
                        type: integer
                        example: 10
                  message:
                    type: string
                    example: "All notifications marked as read"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/stats:
    get:
      tags:
        - Notifications
      summary: Get notification statistics
      description: Get notification statistics for the current user
      responses:
        '200':
          description: Notification statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      totalCount:
                        type: integer
                        example: 25
                      unreadCount:
                        type: integer
                        example: 5
                      readCount:
                        type: integer
                        example: 20
                      typeStats:
                        type: object
                        additionalProperties:
                          type: integer
                        example:
                          info: 15
                          warning: 5
                          error: 2
                  message:
                    type: string
                    example: "Notification statistics retrieved successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
    properties:
      id:
        type: integer
        example: 1
      name:
        type: string
        example: "John Doe"
      email:
        type: string
        format: email
        example: "john@example.com"
      role:
        $ref: '#/components/schemas/Role'
      isFreelancer:
        type: boolean
        example: false
      hourlyRate:
        type: number
        example: 50.0
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time

    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Developer"
        desc:
          type: string
          example: "Software Developer"

    Project:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "VOXTREE Development"
        description:
          type: string
          example: "Main project management system"
        clientName:
          type: string
          example: "VOXINNOV PVT LTD"
        budget:
          type: number
          example: 100000.0
        currency:
          type: string
          example: "INR"
        status:
          type: string
          enum: [active, completed, on_hold, cancelled]
          example: "active"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        createdById:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Implement user authentication"
        description:
          type: string
          example: "Add JWT-based authentication system"
        moduleId:
          type: integer
          example: 1
        estimateHours:
          type: number
          example: 8.0
        priority:
          type: string
          enum: [low, medium, high, urgent]
          example: "high"
        dueDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
          example: "pending"
        assignedTo:
          type: array
          items:
            $ref: '#/components/schemas/User'
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        content:
          type: string
          example: "This task is progressing well"
        taskId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        user:
          $ref: '#/components/schemas/User'
        isSystem:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time

    TimeEntry:
      type: object
      properties:
        id:
          type: integer
          example: 1
        taskId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        user:
          $ref: '#/components/schemas/User'
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        durationMins:
          type: integer
          example: 120
        notes:
          type: string
          example: "Worked on authentication implementation"
        billed:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time

    TimesheetEntry:
      type: object
      properties:
        userId:
          type: integer
          example: 1
        userName:
          type: string
          example: "John Doe"
        userEmail:
          type: string
          example: "john@example.com"
        totalMinutes:
          type: integer
          example: 480
        totalAmount:
          type: number
          example: 400.0
        hourlyRate:
          type: number
          example: 50.0
        isFreelancer:
          type: boolean
          example: true

    Invoice:
      type: object
      properties:
        id:
          type: integer
          example: 1
        projectId:
          type: integer
          example: 1
        project:
          $ref: '#/components/schemas/Project'
        clientJson:
          type: string
          example: '{"name":"Client Name","email":"client@example.com"}'
        amount:
          type: number
          example: 5000.0
        currency:
          type: string
          example: "INR"
        dueDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, sent, partial, paid, overdue]
          example: "draft"
        lineItems:
          type: string
          example: '[{"userId":1,"userName":"John","hours":8,"rate":50,"amount":400}]'
        fromDate:
          type: string
          format: date-time
        toDate:
          type: string
          format: date-time
        createdById:
          type: integer
          example: 1
        createdBy:
          $ref: '#/components/schemas/User'
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Payment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        invoiceId:
          type: integer
          example: 1
        amount:
          type: number
          example: 2500.0
        method:
          type: string
          example: "Bank Transfer"
        notes:
          type: string
          example: "Payment received via bank transfer"
        recordedById:
          type: integer
          example: 1
        recordedBy:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        title:
          type: string
          example: "New Task Assignment"
        message:
          type: string
          example: "You have been assigned to task: Implement authentication"
        type:
          type: string
          enum: [info, success, warning, error]
          example: "info"
        read:
          type: boolean
          example: false
        data:
          type: object
          example: {"taskId": 1, "projectName": "VOXTREE Development"}
        createdAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          example: "New Project"
        description:
          type: string
          example: "Project description"
        clientName:
          type: string
          example: "Client Name"
        budget:
          type: number
          example: 50000.0
        currency:
          type: string
          example: "INR"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          example: "Updated Project Name"
        description:
          type: string
          example: "Updated description"
        clientName:
          type: string
          example: "Updated Client Name"
        budget:
          type: number
          example: 75000.0
        currency:
          type: string
          example: "USD"
        status:
          type: string
          enum: [active, completed, on_hold, cancelled]
          example: "active"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    CreateTaskRequest:
      type: object
      required:
        - title
        - moduleId
      properties:
        title:
          type: string
          example: "Implement user authentication"
        description:
          type: string
          example: "Add JWT-based authentication system"
        moduleId:
          type: integer
          example: 1
        estimateHours:
          type: number
          example: 8.0
        priority:
          type: string
          enum: [low, medium, high, urgent]
          example: "high"
        dueDate:
          type: string
          format: date-time

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          example: "Updated task title"
        description:
          type: string
          example: "Updated task description"
        estimateHours:
          type: number
          example: 10.0
        priority:
          type: string
          enum: [low, medium, high, urgent]
          example: "medium"
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
          example: "in_progress"
        dueDate:
          type: string
          format: date-time

    CreateTimeEntryRequest:
      type: object
      required:
        - taskId
        - startTime
        - endTime
      properties:
        taskId:
          type: integer
          example: 1
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        notes:
          type: string
          example: "Worked on authentication implementation"

    CreateInvoiceRequest:
      type: object
      required:
        - projectId
      properties:
        projectId:
          type: integer
          example: 1
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        clientInfo:
          type: object
          properties:
            name:
              type: string
              example: "Client Name"
            email:
              type: string
              format: email
              example: "client@example.com"
            address:
              type: string
              example: "123 Client Street"
            phone:
              type: string
              example: "+1234567890"
        dueDate:
          type: string
          format: date-time
        currency:
          type: string
          example: "INR"

    RecordPaymentRequest:
      type: object
      required:
        - amount
        - method
      properties:
        amount:
          type: number
          example: 2500.0
        method:
          type: string
          example: "Bank Transfer"
        notes:
          type: string
          example: "Payment received via bank transfer"

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 100
        pages:
          type: integer
          example: 10

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation completed successfully"

  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: "Validation error"
              details:
                type: array
                items:
                  type: object

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Unauthorized"

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: "Forbidden: Insufficient permissions"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: "Resource not found"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: "Internal server error"
